<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnePage</title>
  <link rel="stylesheet" href="image/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <div class="logo">OnePage</div>
  <nav id="navLinks">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
  <a class="btn" href="#">Get Started</a>
  <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <span class="tag">Welcome to OnePage</span>
    <h1>We Build Beautiful <span>Digital Experiences</span></h1>
    <p>We are a team of talented designers making modern and responsive websites for your business.</p>
    <div class="hero-btns">
      <a class="btn-main" href="#">Get Started</a>
      <a class="btn-outline" href="#">Learn More</a>
    </div>
  </div>
  <div class="hero-image">
    <div class="hero-card">
      <i class="fa-solid fa-code"></i>
      <p>Web Development</p>
    </div>
    <div class="hero-card">
      <i class="fa-solid fa-palette"></i>
      <p>UI/UX Design</p>
    </div>
    <div class="hero-card">
      <i class="fa-solid fa-mobile-screen"></i>
      <p>App Development</p>
    </div>
    <div class="hero-card">
      <i class="fa-solid fa-chart-line"></i>
      <p>SEO & Marketing</p>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
